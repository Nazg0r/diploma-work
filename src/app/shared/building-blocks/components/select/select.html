<div class="select" [class.select--open]="isOpen()">
  <button
    type="button"
    class="select__trigger"
    (click)="toggle()"
  >
    @if (selectedOption(); as opt) {
      <span class="select__label">{{ opt.label }}</span>
    } @else {
      <span class="select__label select__label--placeholder">
        {{ placeholder() }}
      </span>
    }

    <app-icon
      name="collapse"
      [size]="SM_ICON_SIZE"
      class="select__icon"
    />
  </button>

  @if (isOpen()) {
    <ul class="select__menu" role="listbox">
      @for (opt of options(); track opt.value) {
        <li
          class="select__option"
          [class.select__option--selected]="opt.value === value()"
          [attr.aria-selected]="opt.value === value()"
          role="option"
          (click)="selectOption(opt)"
        >
          <span class="select__option-label">{{ opt.label }}</span>
        </li>
      }
    </ul>
  }
</div>
