<div
  class="collection-item"
  [appLayerDrag]="nodeRef()"
  [appLayerDropIndicator]="nodeRef()"
  [canAcceptInto]="true"
  (dropNode)="onDrop($event)"
>
  <div class="collection-item__header" [style]="indentStyle()">
    <app-icon
      [name]="'collapse'"
      [size]="SM_ICON_SIZE"
      class="collection-item__collapse"
      [class.collapsed]="collection().isCollapsed"
      (click)="toggleCollapse()"
    />
    <app-icon name="folder" [size]="MD_ICON_SIZE" class="collection-item__icon" />
    <span class="collection-item__name" [appRename]="collection().name" (commit)="onRename($event)"
      >{{ collection().name }}
    </span>
  </div>
</div>

@if (!collection().isCollapsed) {
  <div class="collection-item__children">
    @for (child of children(); track child.id) {
      <app-layer-node [nodeRef]="child" [depth]="depth() + 1" (dropNode)="onDrop($event)" />
    }
  </div>
}
