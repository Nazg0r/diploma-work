<div
  class="layer-item"
  [class.active-option]="isActive()"
  [style]="indentStyle()"
  [appLayerDrag]="nodeRef()"
  [appLayerDropIndicator]="nodeRef()"
  (click)="onSelect()"
  (dropNode)="onDrop($event)"
>
  <app-icon
    class="layer-item__icon"
    [name]="layer().isVisible ? 'eye-open' : 'eye-closed'"
    [size]="MD_ICON_SIZE"
    (click)="toggleVisibility($event)"
  />
  <div class="layer-item__thumbnail">
    @if (thumbnailUrl(); as url) {
      <img [src]="url" alt="" class="layer-item__thumbnail-img" />
    } @else {
      <div class="layer-item__thumbnail-empty"></div>
    }
  </div>
  <span class="layer-item__name" [appRename]="layer().name" (commit)="onRename($event)">{{
    layer().name
  }}</span>
  <app-icon
    class="layer-item__icon"
    [name]="layer().isLocked ? 'lock-closed' : 'lock-open'"
    [size]="MD_ICON_SIZE"
    (click)="toggleLock($event)"
  />
  <app-icon
    class="layer-item__icon"
    name="settings"
    [size]="MD_ICON_SIZE"
    (click)="openSettings($event)"
  />
</div>
