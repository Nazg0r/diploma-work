<app-layers-header></app-layers-header>

<div class="layers-tree" (dragover)="onRootDragOver($event)" (drop)="onRootDrop($event)">
  @for (node of rootChildren(); track node.id) {
    <app-layer-node [nodeRef]="node" [depth]="0" (dropNode)="onDrop($event)"></app-layer-node>
  }
</div>

<app-layers-footer></app-layers-footer>
