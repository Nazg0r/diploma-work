@let isOpen = store.isOpen();

<app-icon
  class="main-menu"
  [class.main-menu__active]="isOpen"
  [name]="'menu'"
  [size]="LG_ICON_SIZE"
  (click)="onMenuToggle($event)"
></app-icon>
<div class="project">
  <span class="project__name">Name</span>
  <app-icon class="project__icon" [name]="'download'" [size]="LG_ICON_SIZE"></app-icon>
</div>
<div class="separation-line"></div>
<div class="change-mode">
  <span class="change-mode__text">Sprite Editor</span>
  <app-icon class="change-mode__icon" [name]="'change-mode'" [size]="LG_ICON_SIZE"></app-icon>
</div>
@if (isOpen) {
  <app-menu-overlay [items]="store.items()"></app-menu-overlay>
}
